name: Autofix docs

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Auto-fix markdown table trailing pipes
        run: python3 scripts/fix_markdown_table_pipes.py docs/

      - name: Auto-fix markdown
        run: npx -y markdownlint-cli2 "docs/**/*.md" --fix

      - name: Auto-fix MkDocs Material syntax
        run: python3 scripts/check_mkdocs_syntax.py --fix docs/

      - name: Auto-fix YAML trailing whitespace
        run: |
          sed -i 's/[[:space:]]*$//' mkdocs.yml .github/workflows/*.yml 2>/dev/null || true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No auto-fix changes were needed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch, commit, push, and open PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="autofix/docs-$(date -u +%Y%m%d-%H%M%S)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "style: auto-fix formatting issues"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "style: auto-fix formatting issues" \
            --body "Automated documentation formatting fixes generated by the manual autofix workflow."
