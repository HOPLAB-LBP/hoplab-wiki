name: PR checks

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "requirements.txt"
      - ".markdownlint-cli2.yaml"
      - ".yamllint.yml"
      - "_typos.toml"
      - ".lychee.toml"
      - ".github/workflows/*.yml"
      - "scripts/docs_ci_check.sh"
      - "scripts/check_mkdocs_syntax.py"
      - "scripts/prepare_docs.sh"
      - "scripts/manage-docs-tags.js"
      - "tests/**"

concurrency:
  group: "pr-checks-${{ github.event.pull_request.number || github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  # ───────────────────────────────────────────────────────────
  #  Job 1: Auto-fix safe issues and push back
  # ───────────────────────────────────────────────────────────
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Checkout from the head repo so fork PRs work too. Pushing
          # fixes back is still same-repo only (see guard below).
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-fix markdown table trailing pipes
        run: python3 scripts/fix_markdown_table_pipes.py README.md docs/
        continue-on-error: true

      - name: Auto-fix markdown (trailing spaces, tabs, blank lines)
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            README.md
            docs/**/*.md
          fix: true
        continue-on-error: true

      - name: Auto-fix MkDocs Material syntax (curly quotes, missing blank lines)
        run: python3 scripts/check_mkdocs_syntax.py --fix README.md docs/
        continue-on-error: true

      - name: Auto-fix YAML trailing whitespace
        run: |
          sed -i 's/[[:space:]]*$//' mkdocs.yml .yamllint.yml .github/workflows/*.yml 2>/dev/null || true

      - name: Commit and push fixes
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "style: auto-fix formatting issues"
            if [ "$HEAD_REPO" = "$BASE_REPO" ]; then
              git push
            else
              echo "::notice::Auto-fixes were found but cannot be pushed to fork PRs. See the check report for what needs manual fixing."
            fi
          else
            echo "Nothing to fix."
          fi

  # ───────────────────────────────────────────────────────────
  #  Job 2: Run all checks and post a single report comment
  # ───────────────────────────────────────────────────────────
  check-and-report:
    needs: autofix
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # No ref: checks out the PR merge commit, which exists in the
          # base repo even for fork PRs (and tests the merged result).
          fetch-depth: 0

      - name: Detect automation-related changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            workflow:
              - ".github/workflows/*.yml"
            automation:
              - "scripts/**"
              - "tests/**"
              - "requirements.txt"
              - ".markdownlint-cli2.yaml"
              - ".yamllint.yml"
              - ".lychee.toml"
              - "_typos.toml"

      # ── Setup ─────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create results directory
        run: mkdir -p /tmp/pr-checks

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt yamllint

      - name: Prepare generated docs
        run: bash scripts/prepare_docs.sh

      # ── Check 1: Spell check ─────────────────────────────
      - name: Install typos
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          rm -rf "$RUNNER_TEMP/typos-extract"
          mkdir -p "$RUNNER_TEMP/typos-extract"
          TYPOS_VERSION="v1.43.5"
          curl -fsSL "https://github.com/crate-ci/typos/releases/download/${TYPOS_VERSION}/typos-${TYPOS_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            -o "$RUNNER_TEMP/typos.tar.gz"
          tar -xzf "$RUNNER_TEMP/typos.tar.gz" -C "$RUNNER_TEMP/typos-extract"
          install "$RUNNER_TEMP/typos-extract/typos" "$RUNNER_TEMP/bin/typos"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/typos" --version

      - name: Spell check
        id: spellcheck
        if: always()
        run: |
          set -o pipefail
          if typos --config ./_typos.toml --format brief 2>&1 | tee /tmp/pr-checks/spellcheck-raw; then
            echo "passed" > /tmp/pr-checks/spellcheck-status
          else
            echo "failed" > /tmp/pr-checks/spellcheck-status
          fi

      # ── Check 2: Markdown lint ───────────────────────────
      - name: Markdown lint
        id: markdownlint
        if: always()
        run: |
          set -o pipefail
          if npx -y markdownlint-cli2 "README.md" "docs/**/*.md" 2>&1 | tee /tmp/pr-checks/markdownlint-output; then
            echo "passed" > /tmp/pr-checks/markdownlint-status
          else
            echo "failed" > /tmp/pr-checks/markdownlint-status
          fi

      # ── Check 3: YAML lint ───────────────────────────────
      - name: YAML lint
        id: yamllint
        if: always()
        run: |
          set -o pipefail
          if yamllint -c .yamllint.yml -f parsable mkdocs.yml .github/workflows/ 2>&1 | tee /tmp/pr-checks/yamllint-output; then
            echo "passed" > /tmp/pr-checks/yamllint-status
          else
            echo "failed" > /tmp/pr-checks/yamllint-status
          fi

      # ── Check 4: Link check ──────────────────────────────
      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Link check
        id: linkcheck
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2.0.2
        with:
          args: --config .lychee.toml --format markdown README.md docs/**/*.md
          output: /tmp/pr-checks/linkcheck-output.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark link check status
        if: always()
        run: |
          if [ "$LINKCHECK_EXIT" = "0" ]; then
            echo "passed" > /tmp/pr-checks/linkcheck-status
          else
            echo "failed" > /tmp/pr-checks/linkcheck-status
          fi
        env:
          LINKCHECK_EXIT: ${{ steps.linkcheck.outputs.exit_code }}

      # ── Check 5: MkDocs build ────────────────────────────
      - name: MkDocs build
        id: mkdocs
        if: always()
        run: |
          set -o pipefail
          chmod +x scripts/docs_ci_check.sh
          if scripts/docs_ci_check.sh 2>&1 | tee /tmp/pr-checks/mkdocs-output; then
            echo "passed" > /tmp/pr-checks/mkdocs-status
          else
            echo "failed" > /tmp/pr-checks/mkdocs-status
          fi

      # ── Check 6: MkDocs Material syntax ─────────────────
      - name: MkDocs Material syntax check
        id: mkdocs_syntax
        if: always()
        run: |
          set -o pipefail
          if python3 scripts/check_mkdocs_syntax.py README.md docs/ 2>&1 | tee /tmp/pr-checks/mkdocs-syntax-output; then
            echo "passed" > /tmp/pr-checks/mkdocs-syntax-status
          else
            echo "failed" > /tmp/pr-checks/mkdocs-syntax-status
          fi

      # ── Check 7: Automation regression tests ────────────
      - name: Automation regression tests
        id: automation_tests
        if: always() && steps.changes.outputs.automation == 'true'
        run: |
          set -o pipefail
          if {
            bash tests/test_check_mkdocs_syntax.sh
            bash tests/test_fix_markdown_table_pipes.sh
            node tests/test-manage-docs-tags.js
          } 2>&1 | tee /tmp/pr-checks/automation-tests-output; then
            echo "passed" > /tmp/pr-checks/automation-tests-status
          else
            echo "failed" > /tmp/pr-checks/automation-tests-status
          fi

      # ── Check 8: Workflow lint ──────────────────────────
      - name: Workflow lint
        id: workflow_lint
        if: always() && steps.changes.outputs.workflow == 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          rm -rf "$RUNNER_TEMP/actionlint-extract"
          mkdir -p "$RUNNER_TEMP/actionlint-extract"
          ACTIONLINT_VERSION="1.7.12"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o "$RUNNER_TEMP/actionlint.tar.gz"
          tar -xzf "$RUNNER_TEMP/actionlint.tar.gz" -C "$RUNNER_TEMP/actionlint-extract"
          install "$RUNNER_TEMP/actionlint-extract/actionlint" "$RUNNER_TEMP/bin/actionlint"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          actionlint -version
          set -o pipefail
          if actionlint .github/workflows/*.yml 2>&1 | tee /tmp/pr-checks/workflow-lint-output; then
            echo "passed" > /tmp/pr-checks/workflow-lint-status
          else
            echo "failed" > /tmp/pr-checks/workflow-lint-status
          fi

      # ── Assemble and post the report ─────────────────────
      - name: Build report
        if: always()
        env:
          EDIT_BASE: ${{ github.server_url }}/${{ github.repository }}/edit/${{ github.head_ref }}
        run: |
          REPORT="/tmp/pr-checks/report.md"

          # Hidden marker so we can find and update this comment on future runs
          echo '<!-- pr-checks-report -->' > "$REPORT"

          SPELL=$(cat /tmp/pr-checks/spellcheck-status 2>/dev/null || echo "skipped")
          MDLINT=$(cat /tmp/pr-checks/markdownlint-status 2>/dev/null || echo "skipped")
          YAML=$(cat /tmp/pr-checks/yamllint-status 2>/dev/null || echo "skipped")
          LINKS=$(cat /tmp/pr-checks/linkcheck-status 2>/dev/null || echo "skipped")
          BUILD=$(cat /tmp/pr-checks/mkdocs-status 2>/dev/null || echo "skipped")
          SYNTAX=$(cat /tmp/pr-checks/mkdocs-syntax-status 2>/dev/null || echo "skipped")
          AUTOTESTS=$(cat /tmp/pr-checks/automation-tests-status 2>/dev/null || echo "skipped")
          WFLINT=$(cat /tmp/pr-checks/workflow-lint-status 2>/dev/null || echo "skipped")

          # Helper: clickable edit link for a file at a line number
          # Usage: edit_link "path/to/file" "42" → markdown link to GitHub edit view
          edit_link() {
            local filepath="$1"
            local lineno="$2"
            # Strip leading ./ if present
            filepath="${filepath#./}"
            if [ -n "$lineno" ]; then
              echo "[\`$filepath\` (line $lineno)]($EDIT_BASE/$filepath#L$lineno)"
            else
              echo "[\`$filepath\`]($EDIT_BASE/$filepath)"
            fi
          }

          # docs/contribute.md is generated from README.md, so send contributors
          # to the source file they actually need to edit.
          report_fix_target() {
            local filepath="$1"
            filepath="${filepath#./}"
            if [ "$filepath" = "docs/contribute.md" ]; then
              echo "[\`README.md\` (sync source for \`docs/contribute.md\`)]($EDIT_BASE/README.md)"
            else
              edit_link "$filepath"
            fi
          }

          # Helper: status emoji
          emoji() {
            case "$1" in
              passed)  echo ":white_check_mark:" ;;
              failed)  echo ":x:" ;;
              *)       echo ":white_circle:" ;;
            esac
          }

          # Link check emoji: warning instead of failure (advisory only)
          link_emoji() {
            case "$1" in
              passed)  echo ":white_check_mark:" ;;
              failed)  echo ":warning:" ;;
              *)       echo ":white_circle:" ;;
            esac
          }

          status_label() {
            case "$1" in
              passed) echo "Passed" ;;
              failed) echo "**Failed**" ;;
              skipped) echo "Skipped" ;;
              *) echo "$1" ;;
            esac
          }

          link_status_label() {
            case "$1" in
              passed) echo "Passed" ;;
              failed) echo "**Warning**" ;;
              skipped) echo "Skipped" ;;
              *) echo "$1" ;;
            esac
          }

          append_file_or_placeholder() {
            local filepath="$1"
            if [ -f "$filepath" ]; then
              cat "$filepath"
            else
              echo "(output not captured)"
            fi
          }

          # Count failures (link check is advisory — excluded from count)
          FAILURES=0
          for s in "$SPELL" "$MDLINT" "$YAML" "$BUILD" "$SYNTAX" "$AUTOTESTS" "$WFLINT"; do
            [ "$s" = "failed" ] && FAILURES=$((FAILURES + 1))
          done

          # ── All passed ──────────────────────────────────
          if [ "$FAILURES" -eq 0 ]; then
            cat >> "$REPORT" << EOF
          ## :white_check_mark: All checks passed

          Great job! Your changes look good.

          | Check | Status |
          |-------|--------|
          | Spell check | $(emoji "$SPELL") Passed |
          | Markdown lint | $(emoji "$MDLINT") Passed |
          | YAML lint | $(emoji "$YAML") Passed |
          | Link check | $(link_emoji "$LINKS") Passed |
          | MkDocs build | $(emoji "$BUILD") Passed |
          | MkDocs syntax | $(emoji "$SYNTAX") Passed |
          | Automation regression tests | $(emoji "$AUTOTESTS") Passed |
          | Workflow lint | $(emoji "$WFLINT") Passed |

          A reviewer will take a look shortly.
          EOF
          else

          # ── Header with summary table ──────────────────
            cat >> "$REPORT" << EOF
          ## :mag: PR check results

          Some checks found issues that need your attention. Don't worry — most of these are easy to fix!

          | Check | Status |
          |-------|--------|
          | Spell check | $(emoji "$SPELL") $(status_label "$SPELL") |
          | Markdown lint | $(emoji "$MDLINT") $(status_label "$MDLINT") |
          | YAML lint | $(emoji "$YAML") $(status_label "$YAML") |
          | Link check | $(link_emoji "$LINKS") $(link_status_label "$LINKS") |
          | MkDocs build | $(emoji "$BUILD") $(status_label "$BUILD") |
          | MkDocs syntax | $(emoji "$SYNTAX") $(status_label "$SYNTAX") |
          | Automation regression tests | $(emoji "$AUTOTESTS") $(status_label "$AUTOTESTS") |
          | Workflow lint | $(emoji "$WFLINT") $(status_label "$WFLINT") |

          Scroll down for details on each failed check and step-by-step instructions to fix them.
          EOF
          fi

          # ── Spell check section ─────────────────────────
          if [ "$SPELL" = "failed" ]; then
            {
              cat << 'EOF'

          ---

          ### :x: Spell check — typos found

          The spell checker found words that look misspelled. Here's exactly what was flagged:

          | Location | Found | Suggested fix |
          |----------|-------|---------------|
          EOF

              # Parse typos brief format: "file:line:col: error: `typo` should be `fix`"
              spell_rows_written=false
              if [ -f /tmp/pr-checks/spellcheck-raw ]; then
                while IFS= read -r line; do
                  # Use \x60 (backtick) to avoid shellcheck SC2016 false positives with literal backticks in regex.
                  # Match: filepath:line:col: error: `word` should be `correction`
                  if echo "$line" | grep -qP '.*:\d+:\d+:.*\x60.*\x60 should be \x60.*\x60'; then
                    file=$(echo "$line" | cut -d: -f1)
                    lineno=$(echo "$line" | cut -d: -f2)
                    typo=$(echo "$line" | awk -F'\x60' '{print $2}')
                    fix=$(echo "$line" | awk -F'\x60' '{print $4}')
                    spell_rows_written=true
                    echo "| $(edit_link "$file" "$lineno") | \`$typo\` | \`$fix\` |"
                  # Match without correction: filepath:line:col: error: `word`
                  elif echo "$line" | grep -qP '.*:\d+:\d+:.*\x60.*\x60'; then
                    file=$(echo "$line" | cut -d: -f1)
                    lineno=$(echo "$line" | cut -d: -f2)
                    typo=$(echo "$line" | awk -F'\x60' '{print $2}')
                    spell_rows_written=true
                    echo "| $(edit_link "$file" "$lineno") | \`$typo\` | *(check manually)* |"
                  fi
                done < /tmp/pr-checks/spellcheck-raw
              fi

              # Fallback: if no table rows were generated, show raw output
              if [ "$spell_rows_written" = "false" ]; then
                echo ""
                echo '```'
                append_file_or_placeholder /tmp/pr-checks/spellcheck-raw
                echo '```'
              fi

              cat << 'EOF'

          **How to fix:**

          For each word in the table above:
          1. **If it's a real typo** — open the file, go to the line number shown, and correct the spelling.
          2. **If the word is correct** (e.g. a technical term, name, abbreviation, or foreign word) — add it to the file `_typos.toml` so it won't be flagged again:
             ```toml
             [default.extend-words]
             # Add your word here (case-sensitive):
             YourWord = "YourWord"
             ```
          EOF
            } >> "$REPORT"
          fi

          # ── Automation regression tests section ─────────
          if [ "$AUTOTESTS" = "failed" ]; then
            {
              cat << 'EOF'

          ---

          ### :x: Automation regression tests — repo support checks failed

          One or more tracked automation regression tests failed. These tests protect the helper scripts used by our workflows, so this usually means a recent workflow or script change broke repo automation behavior.

          **How to fix:**

          1. Re-run the same test entrypoints locally from the repo root:
             ```bash
             bash tests/test_check_mkdocs_syntax.sh
             bash tests/test_fix_markdown_table_pipes.sh
             node tests/test-manage-docs-tags.js
             ```
          2. Read the first failing test output below and fix the underlying script or fixture mismatch.
          3. Re-run the failing command locally before pushing again.

          <details>
          <summary>Full automation test output</summary>

          ```
          EOF
              append_file_or_placeholder /tmp/pr-checks/automation-tests-output
              cat << 'EOF'
          ```

          </details>
          EOF
            } >> "$REPORT"
          fi

          # ── Workflow lint section ───────────────────────
          if [ "$WFLINT" = "failed" ]; then
            {
              cat << 'EOF'

          ---

          ### :x: Workflow lint — GitHub Actions syntax or shell issues found

          `actionlint` found a problem in one or more workflow files. This usually means one of these:

          - invalid workflow syntax or unsupported keys
          - a bad action reference
          - shell script issues inside a `run:` block

          EOF
              if [ -f /tmp/pr-checks/workflow-lint-output ]; then
                echo "| Workflow file | Problem |"
                echo "|---------------|---------|"
                while IFS= read -r line; do
                  file="${line%%:*}"
                  problem="${line#*:}"
                  problem="${problem# }"
                  echo "| \`$file\` | $problem |"
                done < /tmp/pr-checks/workflow-lint-output
              fi

              cat << 'EOF'

          **How to fix:**

          1. Run `actionlint .github/workflows/*.yml` locally.
          2. If the message mentions a ShellCheck code such as `SC2001`, `SC2016`, or `SC2129`, fix the shell inside the relevant `run:` block rather than ignoring it.
          3. If the message mentions an action ref, key, or event, correct the workflow YAML and re-run `actionlint`.

          <details>
          <summary>Full workflow-lint output</summary>

          ```
          EOF
              append_file_or_placeholder /tmp/pr-checks/workflow-lint-output
              cat << 'EOF'
          ```

          </details>
          EOF
            } >> "$REPORT"
          fi

          # ── Markdown lint section ───────────────────────
          if [ "$MDLINT" = "failed" ]; then
            {
              cat << 'EOF'

          ---

          ### :x: Markdown lint — formatting issues

          Some markdown formatting issues were found that couldn't be auto-fixed.

          EOF

              # Parse markdownlint output into a readable table
              # Format: "file:line[:column] rule/name description" — the
              # column is omitted by whole-line rules like MD012/MD047.
              if [ -f /tmp/pr-checks/markdownlint-output ]; then
                echo "| Location | Issue |"
                echo "|----------|-------|"
                grep -E '^docs/.*:[0-9]+' /tmp/pr-checks/markdownlint-output | head -30 | while IFS= read -r line; do
                  file="${line%%:*}"
                  rest="${line#*:}"
                  # Line number, dropping the ":column" part if present.
                  lineno="${rest%% *}"
                  lineno="${lineno%%:*}"
                  # Issue text: everything after "line[:col] ", with pipes
                  # escaped so they can't break the table.
                  issue="${rest#* }"
                  issue="${issue//|/\\|}"
                  echo "| $(edit_link "$file" "$lineno") | $issue |"
                done
              fi

              cat << 'EOF'

          <details>
          <summary>Full output</summary>

          ```
          EOF
              append_file_or_placeholder /tmp/pr-checks/markdownlint-output
              cat << 'EOF'
          ```

          </details>

          **How to fix:** Open the file at the line number shown and fix the issue described. Common problems:

          | Issue | What it means | How to fix |
          |-------|--------------|------------|
          | **Bare URL** | A URL is pasted without formatting | Wrap it: `[link text](https://...)` or `<https://...>` |
          | **Wrong heading style** | Heading uses underlines instead of `#` | Use `## My heading` with `#` symbols |
          | **Multiple blank lines** | Two or more empty lines in a row | Remove the extra blank lines |
          | **Trailing spaces** | Invisible spaces at end of a line | Delete the spaces at the end of the line |
          EOF
            } >> "$REPORT"
          fi

          # ── YAML lint section ───────────────────────────
          if [ "$YAML" = "failed" ]; then
            {
              cat << 'EOF'

          ---

          ### :x: YAML lint — configuration file issues

          Problems were found in YAML configuration files (like `mkdocs.yml`).

          EOF

              # Parse yamllint parsable output: "file:line:col: [level] message"
              if [ -f /tmp/pr-checks/yamllint-output ]; then
                echo "| Location | Problem |"
                echo "|----------|---------|"
                while IFS= read -r line; do
                  file=$(echo "$line" | cut -d: -f1)
                  lineno=$(echo "$line" | cut -d: -f2)
                  # Strip "file:line:col" and the following space.
                  msg="${line#*:}"
                  msg="${msg#*:}"
                  msg="${msg#*:}"
                  msg="${msg# }"
                  echo "| $(edit_link "$file" "$lineno") | $msg |"
                done < /tmp/pr-checks/yamllint-output
              fi

              cat << 'EOF'

          **How to fix:** Open the file at the line number shown. YAML is sensitive to formatting:

          | Issue | What it means | How to fix |
          |-------|--------------|------------|
          | **Wrong indentation** | Spaces don't match the expected level | Use exactly 2 spaces per indent level |
          | **Trailing spaces** | Invisible spaces at end of a line | Delete the spaces at the end |
          | **Too many blank lines** | Multiple empty lines in a row | Keep at most one blank line |
          | **Line too long** | A line exceeds the maximum length | Break it into multiple lines |

          > **Tip:** YAML only uses spaces for indentation, never tabs.
          EOF
            } >> "$REPORT"
          fi

          # ── Link check section ─────────────────────────
          if [ "$LINKS" = "failed" ]; then
            {
              cat << 'EOF'

          ---

          ### :warning: Link check — potential issues found

          Some links may be broken or unreachable. Note that external sites sometimes block automated checks, so **verify the links below in your browser** before taking action.

          EOF
              append_file_or_placeholder /tmp/pr-checks/linkcheck-output.md
              cat << 'EOF'

          **How to fix:** For each broken link above:

          | Problem | How to fix |
          |---------|-----------|
          | **404 Not Found** | The page was removed or the URL changed — find the new URL and update the link |
          | **Timeout / connection error** | The website might be temporarily down — try opening the URL yourself. If it works, this is a false alarm and you can ignore it |
          | **Broken internal link** (e.g. `[text](../other-page.md)`) | The file you're linking to doesn't exist at that path — check the filename and folder structure |

          > **Note:** If a URL is correct but keeps getting flagged (e.g. the site blocks bots), you can add it to `.lychee.toml` under `exclude`:
          > ```toml
          > exclude = [
          >   "https://example.com/.*",
          > ]
          > ```
          EOF
            } >> "$REPORT"
          fi

          # ── MkDocs build section ───────────────────────
          if [ "$BUILD" = "failed" ]; then
            {
              cat << 'EOF'

          ---

          ### :x: MkDocs build — site failed to build

          The documentation site failed to compile. This means your changes can't be published until this is fixed.

          EOF

              # Extract and categorize MkDocs errors
              if [ -f /tmp/pr-checks/mkdocs-output ]; then
                # Check for "not in nav" errors
                if grep -q 'not included in the "nav"' /tmp/pr-checks/mkdocs-output; then
                  cat << 'EOF'

          **Missing from navigation:** You added a new page but forgot to register it.

          The following files need to be added to `mkdocs.yml` under the `nav:` section:

          EOF
                  awk '/not included in the "nav"/{flag=1;next}/^(INFO|WARNING|ERROR|DEBUG|\[)/{flag=0}flag && /\.md/{print "- `" $NF "`"}' /tmp/pr-checks/mkdocs-output
                  cat << 'EOF'

          To fix this, open `mkdocs.yml`, find the `nav:` section, and add your page in the right spot. For example:
          ```yaml
          nav:
            - Home: index.md
            - Research:
              - fMRI:
                - Your new page: research/fmri/your-new-page.md  # <-- add a line like this
          ```
          EOF
                fi

                # Check for broken internal links / unresolved targets
                if grep -Eq "unrecognized relative link|contains a link '.*', but the target '.*' is not found among documentation files|target not found" /tmp/pr-checks/mkdocs-output; then
                  cat << 'EOF'

          **Broken documentation links:** Some links point to pages MkDocs cannot resolve from the page being built.

          | Fix in | Reported in | Broken target |
          |--------|-------------|---------------|
          EOF
                  grep -E "unrecognized relative link|contains a link '.*', but the target '.*' is not found among documentation files|target not found" /tmp/pr-checks/mkdocs-output | while IFS= read -r line; do
                    file=$(echo "$line" | grep -oP "Doc( file)? '\\K[^']+" | head -1)
                    link=$(echo "$line" | grep -oP "contains an unrecognized relative link '\\K[^']+" | head -1)
                    if [ -z "$link" ]; then
                      link=$(echo "$line" | grep -oP "contains a link '\\K[^']+" | head -1)
                    fi
                    if [ -z "$link" ]; then
                      link=$(echo "$line" | grep -oP "target '\\K[^']+" | head -1)
                    fi
                    [ -z "$file" ] && file="(unknown file)"
                    [ -z "$link" ] && link="(could not parse target)"
                    echo "| $(report_fix_target "$file") | \`$file\` | \`$link\` |"
                  done | awk '!seen[$0]++'
                  cat << 'EOF'

          **How to fix:**

          1. Open the file in the first column and update the broken link target.
          2. If the "Reported in" file is `docs/contribute.md`, edit `README.md` instead because CI copies `README.md` into `docs/contribute.md`.
          3. In `README.md` / `docs/contribute.md`, avoid repo-root paths like `docs/...` for wiki pages. Those are resolved from inside `docs/` during the MkDocs build and usually fail. Prefer a docs-relative path that works from `docs/`, or use the published-site URL.
          4. If the target page was renamed or moved, update the filename/path to the new location.
          EOF
                fi

                # Check for missing anchor errors
                if grep -Eq 'no such anchor|does not contain an anchor|but there is no such anchor on this page' /tmp/pr-checks/mkdocs-output; then
                  cat << 'EOF'

          **Broken anchor links:** Some links point to headings that do not exist on the target page.

          | Fix in | Reported in | Broken link |
          |--------|-------------|-------------|
          EOF
                  grep -E 'no such anchor|does not contain an anchor|but there is no such anchor on this page' /tmp/pr-checks/mkdocs-output | while IFS= read -r line; do
                    file=$(echo "$line" | grep -oP "Doc( file)? '\\K[^']+" | head -1)
                    link=$(echo "$line" | grep -oP "contains a link '\\K[^']+" | head -1)
                    if [ -z "$link" ]; then
                      link=$(echo "$line" | grep -oP "'[^']*#[^']+'" | head -1 | tr -d "'")
                    fi
                    [ -z "$file" ] && file="(unknown file)"
                    [ -z "$link" ] && link="(could not parse anchor)"
                    echo "| $(report_fix_target "$file") | \`$file\` | \`$link\` |"
                  done
                  echo ''
                  cat << 'EOF'
          **How to fix:**

          1. Open the file in the first column.
          2. Update the `#anchor` fragment so it matches the rendered heading slug on the destination page.
          3. If the warning is reported in `docs/contribute.md`, edit `README.md` instead because `docs/contribute.md` is generated from it.
          EOF
                fi
              fi

              # Always show full output in collapsed section
              cat << 'EOF'

          <details>
          <summary>Full build output</summary>

          ```
          EOF
              if grep -E '^(WARNING|ERROR|\[ERROR\]|\[docs-ci\])' /tmp/pr-checks/mkdocs-output >/dev/null 2>&1; then
                grep -E '^(WARNING|ERROR|\[ERROR\]|\[docs-ci\])' /tmp/pr-checks/mkdocs-output
              else
                append_file_or_placeholder /tmp/pr-checks/mkdocs-output
              fi
              cat << 'EOF'
          ```

          </details>
          EOF
            } >> "$REPORT"
          fi

          # ── MkDocs syntax section ───────────────────────
          if [ "$SYNTAX" = "failed" ]; then
            {
              cat << 'EOF'

          ---

          ### :x: MkDocs syntax — rendering issues detected

          Some MkDocs Material syntax issues were found that cause **silent rendering failures** (tabs not appearing, content falling outside admonitions, etc.).

          EOF

              if [ -f /tmp/pr-checks/mkdocs-syntax-output ]; then
                echo "| Location | Issue |"
                echo "|----------|-------|"
                grep -E '^docs/.*:[0-9]+:' /tmp/pr-checks/mkdocs-syntax-output | head -30 | while IFS= read -r line; do
                  file=$(echo "$line" | cut -d: -f1)
                  lineno=$(echo "$line" | cut -d: -f2)
                  # Strip "file:line" and the following space.
                  issue="${line#*:}"
                  issue="${issue#*:}"
                  issue="${issue# }"
                  echo "| $(edit_link "$file" "$lineno") | $issue |"
                done
              fi

              cat << 'EOF'

          **How to fix:**

          | Issue | What it means | How to fix |
          |-------|--------------|------------|
          | **Curly/smart quotes in tab title** | The `===` line uses `\u201c...\u201d` instead of `"..."` | Replace with straight ASCII double quotes |
          | **Missing blank line after tab header** | Content starts right after `=== "Title"` | Add an empty line between the `===` line and the content |
          | **Tab/admonition content not indented** | Content is not indented 4 spaces inside the block | Indent all content by 4 spaces relative to the `===` or `!!!` marker |
          | **Code block content at column 0** | Code inside an indented fence starts at the left margin | Indent the code to match the fence indentation |

          > **Tip:** Curly quotes and missing blank lines are auto-fixed by CI. If issues persist after the auto-fix commit, they require manual attention.

          <details>
          <summary>Examples of correct syntax</summary>

          **Content tabs** — always leave a blank line after `===` and indent content by 4 spaces:
          ~~~markdown
          === "Tab Title"

              Content goes here, indented 4 spaces.

              ```bash
              code also indented 4 spaces
              ```
          ~~~

          **Admonitions** — indent content by 4 spaces (no blank line needed):
          ~~~markdown
          !!! note "Title"
              Content indented 4 spaces.
          ~~~

          **Admonition inside a tab** — content needs 4 + 4 = 8 spaces:
          ~~~markdown
          === "Setup"

              !!! warning
                  This text is indented 8 spaces (4 for the tab + 4 for the admonition).
          ~~~

          </details>
          EOF
            } >> "$REPORT"
          fi

          # ── Footer ─────────────────────────────────────
          if [ "$FAILURES" -gt 0 ]; then
            cat >> "$REPORT" << 'EOF'

          ---

          ### :bulb: Quick troubleshooting for lint failures

          If CI reports shellcheck/actionlint warnings (for example ShellCheck codes `SC2001`, `SC2016`, `SC2129`), here is how to fix them quickly:

          | Warning | What it means | Typical fix |
          |---------|---------------|-------------|
          | `SC2001` | Using `sed` for simple string cleanup | Prefer shell parameter expansion (e.g., `${var#prefix}` / `${var%suffix}`) |
          | `SC2016` | Single-quoted string contains characters that look like expansions | Use double quotes when interpolation is intended, or escape literals like backticks |
          | `SC2129` | Repeated `>> file` writes | Group writes with `{ ...; } >> file` or use a single heredoc block |

          > Re-run `actionlint .github/workflows/*.yml` locally after editing workflow scripts.

          ---

          > :pushpin: **Need help?** Ping @costantinoai in the PR comments and I'll help you sort it out.
          >
          > Push a new commit to re-run these checks — this comment will update automatically.
          EOF
          fi

          echo "--- Report ---"
          cat "$REPORT"

      - name: Write report to job summary
        if: always()
        run: cat /tmp/pr-checks/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Save PR metadata for comment workflow
        if: always()
        run: echo "$PR_NUMBER" > /tmp/pr-checks/pr-number.txt
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-check-report
          path: |
            /tmp/pr-checks/report.md
            /tmp/pr-checks/pr-number.txt
          retention-days: 1

      # ── Final verdict ──────────────────────────────────
      - name: Fail if any check failed
        if: always()
        run: |
          SPELL=$(cat /tmp/pr-checks/spellcheck-status 2>/dev/null || echo "skipped")
          MDLINT=$(cat /tmp/pr-checks/markdownlint-status 2>/dev/null || echo "skipped")
          YAML=$(cat /tmp/pr-checks/yamllint-status 2>/dev/null || echo "skipped")
          LINKS=$(cat /tmp/pr-checks/linkcheck-status 2>/dev/null || echo "skipped")
          BUILD=$(cat /tmp/pr-checks/mkdocs-status 2>/dev/null || echo "skipped")
          SYNTAX=$(cat /tmp/pr-checks/mkdocs-syntax-status 2>/dev/null || echo "skipped")
          AUTOTESTS=$(cat /tmp/pr-checks/automation-tests-status 2>/dev/null || echo "skipped")
          WFLINT=$(cat /tmp/pr-checks/workflow-lint-status 2>/dev/null || echo "skipped")

          # Link check is advisory only — external sites may block CI runners.
          # Results still appear in the PR comment for manual review.
          if [ "$LINKS" = "failed" ]; then
            echo "::warning::Link check found issues — see the PR comment for details."
          fi

          if [ "$BUILD" = "failed" ]; then
            echo "::error::MkDocs build failed. See the PR comment for a parsed breakdown of missing nav entries, broken documentation links, and broken anchors."
            if grep -Eq "target not found|unrecognized relative link|does not contain an anchor|no such anchor|not included in the \"nav\"" /tmp/pr-checks/mkdocs-output 2>/dev/null; then
              grep -E "target not found|unrecognized relative link|does not contain an anchor|no such anchor|not included in the \"nav\"|^\\[ERROR\\]|^\\[docs-ci\\]" /tmp/pr-checks/mkdocs-output | head -40 || true
            fi
          fi

          FAILED=false
          for s in "$SPELL" "$MDLINT" "$YAML" "$BUILD" "$SYNTAX" "$AUTOTESTS" "$WFLINT"; do
            [ "$s" = "failed" ] && FAILED=true
          done
          if [ "$FAILED" = "true" ]; then
            echo "One or more checks failed. See the PR comment for details."
            exit 1
          fi
